<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Translation Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <h1>Translation Debug Test</h1>
    
    <div class="test">
        <h3>Test Element with data-key:</h3>
        <p data-key="philosophy_title">The Art of Masculine Restoration (should translate)</p>
        
        <h3>Test Translation Function:</h3>
        <button onclick="testTranslation()">Test Translation Function</button>
        <div id="testResult"></div>
    </div>
    
    <script>
        // Copy the translations object from the main site
        const translations = {
            en: {
                philosophy_title: "The Art of Masculine Restoration"
            },
            cn: {
                philosophy_title: "男性恢复的艺术"
            },
            jp: {
                philosophy_title: "男性回復の芸術"
            },
            kr: {
                philosophy_title: "남성 회복의 예술"
            }
        };
        
        // Copy the setLanguage function
        function setLanguage(lang) {
            console.log('Setting language to:', lang);
            
            // Update all elements with data-key attribute
            document.querySelectorAll('[data-key]').forEach(element => {
                const key = element.getAttribute('data-key');
                console.log('Found element with key:', key, 'Element:', element);
                
                if (translations[lang] && translations[lang][key]) {
                    console.log('Translating', key, 'to:', translations[lang][key]);
                    element.textContent = translations[lang][key];
                } else {
                    console.log('No translation found for', key, 'in language', lang);
                }
            });
        }
        
        function testTranslation() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '';
            
            // Test 1: Check if element with data-key exists
            const elements = document.querySelectorAll('[data-key]');
            resultDiv.innerHTML += `<p>Found ${elements.length} elements with data-key attribute</p>`;
            
            // Test 2: Try to translate to Chinese
            setLanguage('cn');
            
            // Test 3: Check if translation worked
            const translatedText = document.querySelector('[data-key="philosophy_title"]').textContent;
            resultDiv.innerHTML += `<p>Current text: "${translatedText}"</p>`;
            
            if (translatedText === "男性恢复的艺术") {
                resultDiv.innerHTML += `<p class="success">✓ Translation WORKED!</p>`;
            } else {
                resultDiv.innerHTML += `<p class="error">✗ Translation FAILED! Text is still: "${translatedText}"</p>`;
            }
        }
        
        // Run test on load
        window.onload = testTranslation;
    </script>
</body>
</html>
