<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Translations</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .key { font-weight: bold; color: #333; }
        .value { color: #666; }
    </style>
</head>
<body>
    <h1>Translation Test</h1>
    
    <div class="test">
        <div class="key">philosophy_title:</div>
        <div class="value" id="philosophy_title_test">Loading...</div>
    </div>
    
    <div class="test">
        <div class="key">philosophy_subtitle:</div>
        <div class="value" id="philosophy_subtitle_test">Loading...</div>
    </div>
    
    <div class="test">
        <div class="key">our_philosophy:</div>
        <div class="value" id="our_philosophy_test">Loading...</div>
    </div>
    
    <script>
        // Fetch the main website and extract translations
        fetch('https://the-sense-bangkok.vercel.app')
            .then(response => response.text())
            .then(html => {
                // Extract the script content
                const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
                if (scriptMatch) {
                    const scriptContent = scriptMatch[1];
                    
                    // Try to extract translations object
                    const translationsMatch = scriptContent.match(/const translations = ({[\s\S]*?});/);
                    if (translationsMatch) {
                        try {
                            // Clean the string and eval to get object
                            const translationsStr = translationsMatch[1].replace(/\n/g, ' ').replace(/\s+/g, ' ');
                            // This is a simplified approach - in production we'd parse properly
                            console.log('Found translations object');
                            
                            // Check for specific keys
                            const hasPhilosophyTitle = scriptContent.includes('philosophy_title:');
                            const hasPhilosophySubtitle = scriptContent.includes('philosophy_subtitle:');
                            const hasOurPhilosophy = scriptContent.includes('our_philosophy:');
                            
                            document.getElementById('philosophy_title_test').textContent = hasPhilosophyTitle ? 'FOUND' : 'MISSING';
                            document.getElementById('philosophy_subtitle_test').textContent = hasPhilosophySubtitle ? 'FOUND' : 'MISSING';
                            document.getElementById('our_philosophy_test').textContent = hasOurPhilosophy ? 'FOUND' : 'MISSING';
                            
                            // Check Chinese translations
                            const cnSection = scriptContent.match(/cn: {([\s\S]*?)}/);
                            if (cnSection) {
                                const cnContent = cnSection[1];
                                const cnHasPhilosophyTitle = cnContent.includes('philosophy_title:');
                                console.log('Chinese has philosophy_title:', cnHasPhilosophyTitle);
                            }
                        } catch (e) {
                            console.error('Error parsing translations:', e);
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching website:', error);
            });
    </script>
</body>
</html>
